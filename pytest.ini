[pytest]
# addopts — опции, применяемые к КАЖДОМУ запуску
#   -q   тихий вывод (точки вместо строк)
#   -ra  показать причины всех непрошедших тестов
#
# Флаг -r выбирает, по каким исходам печатать "short test summary":
#   f — failed (упал)         E — error (ошибка вне теста)
#   s — skipped (пропущен)    x — xfailed (упал ожидаемо)
#   X — xpassed (вдруг прошёл)
#   a — всё, кроме passed     A — вообще всё
# Примеры: -rsx (skip+xfail) · -ra (все проблемы) · -rf (только падения)
addopts = -q -ra
markers =
    smoke: быстрая предстартовая